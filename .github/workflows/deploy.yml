name: test_and_deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ruff
        run: |
          pip install ruff
          ruff check backend/
          ruff format --check backend/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run ESLint
        run: |
          cd frontend
          npm ci
          npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_temp_user
          POSTGRES_PASSWORD: ci_temp_pass
          POSTGRES_DB: ci_temp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_temp_user -d ci_temp_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===== Backend tests =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://ci_temp_user:ci_temp_pass@localhost:5432/ci_temp_db
          SECRET_KEY: test-secret-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci
          ENVIRONMENT: test
          ORIGINS: http://localhost
        run: |
          cd backend
          python -m pytest tests/ -v

      - name: Check Alembic migrations
        env:
          POSTGRES_DATABASE_URL_DEV: postgresql+asyncpg://ci_temp_user:ci_temp_pass@localhost:5432/ci_temp_db
          ENVIRONMENT: development
        run: |
          cd backend
          alembic upgrade head
          alembic check

      # ===== Frontend tests =====
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npx vitest run

  build-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/davidgola/humantree-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ghcr.io/davidgola/humantree-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          username: ${{ secrets.SSH_USER }}
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            git config --global --add safe.directory /srv/humantree
            cd /srv/humantree
            git pull origin main
            sudo cp nginx/humantree.conf /etc/nginx/sites-available/humantree
            sudo nginx -t && sudo systemctl reload nginx
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.SSH_USER }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --pull always
            docker image prune -f
            for i in {1..10}; do
              echo "Checking if the application is up... (attempt $i)"
              if curl -X GET http://127.0.0.1:8000/health -f && curl -X GET http://127.0.0.1:3000/ -f; then
                echo "Application is up and running!"
                break
              else
                echo "Application is not responding yet. Retrying in 5 seconds..."
                sleep 5
              fi
              if [ "$i" -eq 10 ]; then
                echo "Application failed to start after 10 attempts."
                exit 1
              fi
            done

            echo "=== Smoke tests HTTPS ==="
            curl -sf https://humantree.vps.webdock.cloud/ > /dev/null || { echo "FAIL: frontend HTTPS"; exit 1; }
            echo "OK: frontend HTTPS"

            curl -sf https://humantree.vps.webdock.cloud/api/v1/skill-trees/ > /dev/null || { echo "FAIL: backend HTTPS"; exit 1; }
            echo "OK: backend API HTTPS"

            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://humantree.vps.webdock.cloud/)
            if [ "$HTTP_CODE" != "301" ]; then
              echo "FAIL: HTTP redirect expected 301, got $HTTP_CODE"
              exit 1
            fi
            echo "OK: HTTP -> HTTPS redirect"

            echo "=== All smoke tests passed ==="
