name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bandit:
    name: SAST Python (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r backend/app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            || true

      - name: Check results
        run: |
          python3 -c "
          import json, sys

          with open('bandit-report.json') as f:
              report = json.load(f)

          results = report.get('results', [])
          metrics = report.get('metrics', {}).get('_totals', {})

          high = metrics.get('SEVERITY.HIGH', 0)
          medium = metrics.get('SEVERITY.MEDIUM', 0)
          low = metrics.get('SEVERITY.LOW', 0)

          print(f'=== Bandit Report ===')
          print(f'High:   {high}')
          print(f'Medium: {medium}')
          print(f'Low:    {low}')
          print()

          if results:
              for r in results:
                  sev = r['issue_severity']
                  conf = r['issue_confidence']
                  print(f\"[{sev}/{conf}] {r['issue_text']}\")
                  print(f\"  -> {r['filename']}:{r['line_number']}\")
                  print()

          # Fail on HIGH severity issues
          if high > 0:
              print('FAILED: High severity issues found.')
              sys.exit(1)

          print('PASSED: No high severity issues.')
          "

  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t humantree-backend:scan ./backend

      - name: Build frontend image
        run: docker build -t humantree-frontend:scan ./frontend --build-arg VITE_API_URL=http://localhost

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: humantree-backend:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: humantree-frontend:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
        continue-on-error: true  # Dependabot handles fixes via PRs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high

  gitleaks:
    name: Secrets Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
