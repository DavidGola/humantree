version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"
      - "security"
    ignore:
      - dependency-name: "pydantic-core"  # géré par pydantic
      - dependency-name: "mpmath"  # bloqué à <1.4 par sympy

  # Node.js frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
