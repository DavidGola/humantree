global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: discord

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_URL}"
        title: |
          {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}
        message: |
          {{ range .Alerts }}
          **Sévérité** : {{ .Labels.severity }}
          **Statut** : {{ .Status | toUpper }}
          **Résumé** : {{ .Annotations.summary }}
          **Détail** : {{ .Annotations.description }}
          {{ end }}
