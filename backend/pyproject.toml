[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "S",      # flake8-bandit (security)
]
ignore = [
    "S101",   # assert used (ok in tests)
    "B008",   # function call in default arg (FastAPI Depends)
    "B904",   # raise from in except (intentional for HTTPException)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S105", "S106", "S107"]  # asserts + test passwords ok
"app/core/config.py" = ["S105"]  # hardcoded password (defaults)
"app/schemas/auth.py" = ["S105"]  # "bearer" is not a password
"app/services/auth_service.py" = ["S106"]  # token_type="bearer" is not a password
"app/services/ai_service.py" = ["E501"]  # long prompt strings ok
"app/services/skill_tree_service.py" = ["S608"]  # SQL uses controlled mapping, not user input

[tool.ruff.lint.isort]
known-first-party = ["app"]
